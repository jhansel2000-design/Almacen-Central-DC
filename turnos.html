<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Control de turnos de despacho — chofer y administración — Almacén Central DC">
  <meta name="theme-color" content="#003882">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdn.sheetjs.com https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:* http://127.0.0.1:* https://*.supabase.co wss://*.supabase.co https://challenges.cloudflare.com; img-src 'self' data: blob: https://challenges.cloudflare.com; media-src 'self'; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Control de Turnos de Despacho — Almacén Central DC</title>
  <script src="js/relay-bootstrap.js?v=1"></script>
  <link rel="icon" type="image/png" href="assets/img/jc-logo-64.png?v=5">
  <link rel="stylesheet" href="css/auth-cinematic.css?v=19">
  <link rel="stylesheet" href="css/auth-security.css?v=3">
  <link rel="stylesheet" href="css/dc-brand.css?v=11">
  <link rel="manifest" href="turnos.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Turnos DC">
  <link rel="stylesheet" href="css/turnos-portal.css?v=23">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="turnos-body">
  <noscript><p class="turnos-noscript">Activa JavaScript para usar el control de turnos.</p></noscript>

  <!-- Vista Chofer (sin login) -->
  <div id="turnosChoferRoot" class="turnos-chofer-root">
    <header class="turnos-chofer-header">
      <img class="turnos-portal-logo" src="assets/img/icon-turnos-portal.svg?v=11" alt="Control de Turnos" width="44" height="44">
      <div>
        <p class="turnos-brand-eyebrow">Almacén Central DC</p>
        <h1 class="turnos-chofer-title">Control de Turnos</h1>
      </div>
      <div class="turnos-chofer-clock">
        <p id="turnosChoferClockTime" class="turnos-clock-time">--:--</p>
        <p class="turnos-clock-tz">Hora RD</p>
      </div>
    </header>
    <main id="turnosChoferMain" class="turnos-chofer-main"></main>
    <footer class="turnos-chofer-foot">
      <button type="button" class="turnos-admin-link" id="turnosAdminLink">Acceso administrativo →</button>
      <a href="index.html" class="turnos-back-link">← Volver al mando</a>
    </footer>
  </div>

  <!-- Login administrativo -->
  <div class="turnos-auth-overlay is-hidden" id="turnosAuthOverlay" role="dialog" aria-labelledby="turnosAuthTitle">
    <div class="turnos-auth-card">
      <div class="turnos-auth-brand" aria-hidden="true">
        <img src="assets/img/icon-turnos-portal.svg?v=11" alt="" width="48" height="48">
      </div>
      <h2 id="turnosAuthTitle">Acceso administrativo</h2>
      <p class="turnos-auth-sub">Gestión de turnos y cambio de estados</p>
      <form id="turnosAuthForm" class="turnos-auth-form" novalidate action="#" method="post">
        <label class="turnos-field"><span>Usuario</span>
          <input id="turnosAuthUsername" class="turnos-input" type="text" autocomplete="username" maxlength="64" required></label>
        <label class="turnos-remember" for="turnosAuthRememberUser">
          <input type="checkbox" id="turnosAuthRememberUser" checked> Guardar usuario</label>
        <label class="turnos-field turnos-field-password"><span>Contraseña</span>
          <input id="turnosAuthPassword" class="turnos-input" type="password" autocomplete="current-password" maxlength="128" required>
          <button type="button" class="turnos-pwd-toggle" id="turnosBtnTogglePassword">Ver</button></label>
        <button type="submit" class="turnos-btn turnos-btn--primary turnos-btn--xl" id="turnosAuthSubmit">Entrar</button>
        <p id="turnosAuthError" class="turnos-form-error" role="alert" hidden></p>
      </form>
      <button type="button" class="turnos-back-btn turnos-back-btn--center" data-chofer-back>Volver al registro de chofer</button>
    </div>
  </div>

  <!-- Vista Admin -->
  <div id="turnosAdminRoot" class="turnos-app is-hidden">
    <aside class="turnos-sidebar" aria-label="Administración">
      <div class="turnos-brand">
        <img class="turnos-portal-logo" src="assets/img/icon-turnos-portal.svg?v=11" alt="Control de Turnos" width="40" height="40">
        <div>
          <p class="turnos-brand-eyebrow">Administración</p>
          <h1 class="turnos-brand-title">Control de Turnos</h1>
        </div>
      </div>
      <nav class="turnos-nav">
        <button type="button" class="turnos-nav-item active" data-turnos-nav="dashboard">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-dashboard.svg?v=11" alt="" width="26" height="26">
          <span>Dashboard</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="despacho">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-despacho.svg?v=11" alt="" width="26" height="26">
          <span>Despacho</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="liquidacion">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-liquidacion.svg?v=11" alt="" width="26" height="26">
          <span>Liquidación</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="nota_credito">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-nota-credito.svg?v=11" alt="" width="26" height="26">
          <span>Nota crédito</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="cancelados">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-gestion.svg?v=11" alt="" width="26" height="26">
          <span>Cancelados</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="export">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-export.svg?v=11" alt="" width="26" height="26">
          <span>Exportar</span>
        </button>
        <button type="button" class="turnos-nav-item" data-turnos-nav="config">
          <img class="turnos-nav-icon" src="assets/img/icon-turnos-config.svg?v=11" alt="" width="26" height="26">
          <span>Configuración</span>
        </button>
      </nav>
      <div class="turnos-sidebar-foot">
        <p class="turnos-operator-label">Sesión</p>
        <p class="turnos-operator-name" id="turnosAdminUserLabel">—</p>
        <button type="button" class="turnos-admin-link" id="turnosBackChoferLink">← Vista chofer</button>
      </div>
    </aside>

    <div class="turnos-main-wrap">
      <header class="turnos-topbar">
        <div>
          <p class="turnos-top-eyebrow">Panel administrativo</p>
          <h2 class="turnos-top-title" id="turnosTopTitle">Resumen del día</h2>
        </div>
        <div class="turnos-clock">
          <p id="turnosClockTime" class="turnos-clock-time">--:--:--</p>
          <p id="turnosClockDate" class="turnos-clock-date">—</p>
          <p class="turnos-clock-tz">Hora República Dominicana</p>
        </div>
      </header>
      <main class="turnos-main">
        <div class="turnos-view" id="turnosViewDashboard" data-module="dashboard"></div>
        <div class="turnos-view" id="turnosViewDespacho" data-module="despacho" hidden></div>
        <div class="turnos-view" id="turnosViewLiquidacion" data-module="liquidacion" hidden></div>
        <div class="turnos-view" id="turnosViewNota_credito" data-module="nota_credito" hidden></div>
        <div class="turnos-view" id="turnosViewCancelados" data-module="cancelados" hidden></div>
        <div class="turnos-view" id="turnosViewExport" data-module="export" hidden></div>
        <div class="turnos-view" id="turnosViewConfig" data-module="config" hidden></div>
      </main>
    </div>

    <nav class="turnos-mobile-nav" aria-label="Navegación móvil admin">
      <button type="button" class="turnos-nav-item active" data-turnos-nav="dashboard" title="Dashboard">
        <img class="turnos-nav-icon" src="assets/img/icon-turnos-dashboard.svg?v=11" alt="" width="28" height="28"></button>
      <button type="button" class="turnos-nav-item" data-turnos-nav="despacho" title="Despacho">
        <img class="turnos-nav-icon" src="assets/img/icon-turnos-despacho.svg?v=11" alt="" width="28" height="28"></button>
      <button type="button" class="turnos-nav-item" data-turnos-nav="liquidacion" title="Liquidación">
        <img class="turnos-nav-icon" src="assets/img/icon-turnos-liquidacion.svg?v=11" alt="" width="28" height="28"></button>
      <button type="button" class="turnos-nav-item" data-turnos-nav="nota_credito" title="Nota crédito">
        <img class="turnos-nav-icon" src="assets/img/icon-turnos-nota-credito.svg?v=11" alt="" width="28" height="28"></button>
      <button type="button" class="turnos-nav-item" data-turnos-nav="cancelados" title="Cancelados">
        <img class="turnos-nav-icon" src="assets/img/icon-turnos-gestion.svg?v=11" alt="" width="28" height="28"></button>
    </nav>
  </div>

  <script src="js/panel-core.js?v=17"></script>
  <script src="js/platform-security.js?v=5"></script>
  <script src="js/platform-web-users.js?v=18"></script>
  <script src="js/platform-admin.js?v=14"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/platform-supabase.js?v=4"></script>
  <script src="js/platform-supabase-realtime.js?v=1"></script>
  <script src="js/platform-supabase-bridge.js?v=5"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/platform-turnos-core.js?v=16"></script>
  <script src="js/platform-turnos-sync.js?v=11"></script>
  <script src="js/platform-turnos-store.js?v=13"></script>
  <script src="js/platform-turnos-alerts.js?v=4"></script>
  <script src="js/platform-turnos-chofer-perms.js?v=3"></script>
  <script src="js/platform-turnos-chofer-call.js?v=5"></script>
  <script src="js/platform-turnos-chofer.js?v=19"></script>
  <script src="js/platform-turnos-admin.js?v=21"></script>
  <script src="js/platform-turnos-app.js?v=6"></script>
</body>
</html>
