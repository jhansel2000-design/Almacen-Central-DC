<body class="turnos-body">
  <noscript><p class="turnos-noscript">Activa JavaScript para usar el control de turnos.</p></noscript>

  <div id="turnosChoferRoot" class="turnos-chofer-root">
    <header class="turnos-chofer-header">

        <p class="turnos-brand-eyebrow">Almacén Central DC</p>
        <h1 class="turnos-chofer-title">Turnos — Chofer</h1>
      </div>
      <div class="turnos-chofer-clock">

    </header>
    <main id="turnosChoferMain" class="turnos-chofer-main"></main>

      <div class="turnos-cross-app turnos-cross-app--supervisor" id="turnosCrossAppSupervisor">

            <strong>Turnos Supervisor</strong>

            <span class="turnos-cross-app__badge" data-pwa-cross-badge hidden>Instalada ✓</span>
          </div>
        </div>
        <div class="turnos-cross-app__actions">
          <button type="button" class="turnos-btn turnos-btn--primary turnos-btn--xl" data-pwa-cross-install>Instalar app supervisor</button>
          <a href="turnos-supervisor.html" class="turnos-btn turnos-btn--secondary turnos-btn--xl">Abrir supervisor</a>
          <button type="button" class="turnos-btn turnos-btn--secondary turnos-btn--xl" data-pwa-cross-copy>Copiar enlace supervisor</button>
        </div>
        <a href="turnos-apps.html" class="turnos-cross-app__hub">Ver las 2 apps organizadas →</a>
      </div>
      <a href="index.html" class="turnos-back-link">← Volver al mando</a>
    </footer>
