<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="jFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="jMesh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <pattern id="jWire" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 8V0M8 0H0" stroke="#ea580c" stroke-width="0.8" opacity="0.45"/>
    </pattern>
    <filter id="jShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7c2d12" flood-opacity="0.35"/>
    </filter>
  </defs>
  <ellipse cx="64" cy="112" rx="38" ry="7" fill="#000" opacity="0.1"/>
  <g filter="url(#jShadow)">
    <!-- postes verticales -->
    <rect x="22" y="18" width="5" height="82" rx="1" fill="url(#jFrame)"/>
    <rect x="58" y="18" width="5" height="82" rx="1" fill="url(#jFrame)"/>
    <rect x="94" y="18" width="5" height="82" rx="1" fill="url(#jFrame)"/>
    <!-- estantes -->
    <rect x="18" y="28" width="86" height="5" rx="1" fill="#9a3412"/>
    <rect x="18" y="52" width="86" height="5" rx="1" fill="#9a3412"/>
    <rect x="18" y="76" width="86" height="5" rx="1" fill="#9a3412"/>
    <!-- malla / jaula -->
    <rect x="24" y="22" width="32" height="28" rx="2" fill="url(#jMesh)" stroke="#ea580c" stroke-width="1.5"/>
    <rect x="24" y="22" width="32" height="28" fill="url(#jWire)"/>
    <rect x="60" y="22" width="32" height="28" rx="2" fill="url(#jMesh)" stroke="#ea580c" stroke-width="1.5"/>
    <rect x="60" y="22" width="32" height="28" fill="url(#jWire)"/>
    <rect x="24" y="56" width="32" height="20" rx="2" fill="#fdba74" stroke="#ea580c" stroke-width="1.5"/>
    <rect x="24" y="56" width="32" height="20" fill="url(#jWire)"/>
    <rect x="60" y="56" width="32" height="20" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <rect x="60" y="56" width="32" height="20" fill="url(#jWire)"/>
    <!-- cajas dentro -->
    <rect x="28" y="60" width="10" height="10" rx="1" fill="#d97706" stroke="#92400e" stroke-width="0.8"/>
    <rect x="66" y="26" width="12" height="12" rx="1" fill="#f97316" stroke="#9a3412" stroke-width="0.8"/>
    <!-- etiqueta ubicación -->
    <rect x="42" y="82" width="28" height="12" rx="2" fill="#fff" stroke="#ea580c" stroke-width="1"/>
    <text x="56" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#c2410c">J-77</text>
  </g>
</svg>
