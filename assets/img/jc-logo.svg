<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AC">
  <defs>
    <radialGradient id="jcRed" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="55%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <filter id="jcShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Borde exterior rojo (estilo emblema DC) -->
  <circle cx="256" cy="256" r="248" fill="url(#jcRed)" filter="url(#jcShadow)"/>
  <!-- Anillo blanco -->
  <circle cx="256" cy="256" r="214" fill="none" stroke="#FFFFFF" stroke-width="20"/>
  <!-- Anillo rojo interior -->
  <circle cx="256" cy="256" r="198" fill="url(#jcRed)"/>
  <!-- Letras AC -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', 'Franklin Gothic Heavy', sans-serif"
    font-weight="900" font-size="168" fill="#FFFFFF" letter-spacing="-2">AC</text>
</svg>
